{% extends "layout.html" %}

{% block title %}
    Deposit | C$50 Finance 💰
{% endblock %}

{% block main %}
    <form action="/deposit" method="post">
        <div class="mb-3">
            <input class="form-control mx-auto w-auto mb-3" type="password" id="password" name="password" placeholder="Confirm Password" required>
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto mb-3" type="number" id="sum" name="sum" placeholder="Amount ($)" min="100" step="100" required>
        </div>
        <button class="btn btn-primary" type="submit">Deposit</button>
    </form>
{% endblock %}
