{% extends "layout.html" %}

{% block title %}
    Change Password | C$50 Finance 💰
{% endblock %}

{% block main %}
    <form action="/change_password" method="post">
        <div class="mb-3 input-group mx-auto w-auto" style="max-width: 300px;">
            <input autofocus class="form-control" name="current_password" placeholder="Current Password" type="password" id="current_password" required>
            <button class="btn btn-outline-secondary" type="button" id="toggleCurrent">
                <svg data-name="Layer 1" width="25" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <path d="M320,256a64,64,0,1,1-64-64A64.07,64.07,0,0,1,320,256Zm189.81,9.42C460.86,364.89,363.6,426.67,256,426.67S51.14,364.89,2.19,265.42a21.33,21.33,0,0,1,0-18.83C51.14,147.11,148.4,85.33,256,85.33s204.86,61.78,253.81,161.25A21.33,21.33,0,0,1,509.81,265.42ZM362.67,256A106.67,106.67,0,1,0,256,362.67,106.79,106.79,0,0,0,362.67,256Z"/>
                </svg>
            </button>
        </div>

        <div class="mb-3 input-group mx-auto w-auto" style="max-width: 300px;">
            <input class="form-control" name="new_password" placeholder="New Password" type="password" id="new_password" minlength="8" required>
            <button class="btn btn-outline-secondary" type="button" id="toggleNew">
                <svg data-name="Layer 1" width="25" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <path d="M320,256a64,64,0,1,1-64-64A64.07,64.07,0,0,1,320,256Zm189.81,9.42C460.86,364.89,363.6,426.67,256,426.67S51.14,364.89,2.19,265.42a21.33,21.33,0,0,1,0-18.83C51.14,147.11,148.4,85.33,256,85.33s204.86,61.78,253.81,161.25A21.33,21.33,0,0,1,509.81,265.42ZM362.67,256A106.67,106.67,0,1,0,256,362.67,106.79,106.79,0,0,0,362.67,256Z"/>
                </svg>
            </button>
        </div>

        <div id="password-length-error" class="text-danger small mt-1 mb-2" style="display:none;">
            Oi! 🚨 New password must be at least 8 characters mate!
        </div>

        <div class="mb-3 input-group mx-auto w-auto" style="max-width: 300px;">
            <input class="form-control" name="confirmation" placeholder="Confirm New Password" type="password" id="confirmation" minlength="8" required>
            <button class="btn btn-outline-secondary" type="button" id="toggleConfirmation">
                <svg data-name="Layer 1" width="25" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                    <path d="M320,256a64,64,0,1,1-64-64A64.07,64.07,0,0,1,320,256Zm189.81,9.42C460.86,364.89,363.6,426.67,256,426.67S51.14,364.89,2.19,265.42a21.33,21.33,0,0,1,0-18.83C51.14,147.11,148.4,85.33,256,85.33s204.86,61.78,253.81,161.25A21.33,21.33,0,0,1,509.81,265.42ZM362.67,256A106.67,106.67,0,1,0,256,362.67,106.79,106.79,0,0,0,362.67,256Z"/>
                </svg>
            </button>
        </div>

        <div id="password-match-error" class="text-danger small mt-1 mb-3" style="display:none;">
            Hell no! 🚨 Passwords do not match mate! 😤
        </div>

        <button class="btn btn-primary" type="submit">Change Password</button>
    </form>

    <script>
        const eyeOpen = `<svg data-name="Layer 1" width="25" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path d="M320,256a64,64,0,1,1-64-64A64.07,64.07,0,0,1,320,256Zm189.81,9.42C460.86,364.89,363.6,426.67,256,426.67S51.14,364.89,2.19,265.42a21.33,21.33,0,0,1,0-18.83C51.14,147.11,148.4,85.33,256,85.33s204.86,61.78,253.81,161.25A21.33,21.33,0,0,1,509.81,265.42ZM362.67,256A106.67,106.67,0,1,0,256,362.67,106.79,106.79,0,0,0,362.67,256Z"/>
        </svg>`;

        const eyeClosed = `<svg data-name="Layer 1" width="25" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
            <path d="M409.84,132.33l95.91-95.91A21.33,21.33,0,1,0,475.58,6.25L6.25,475.58a21.33,21.33,0,1,0,30.17,30.17L140.77,401.4A275.84,275.84,0,0,0,256,426.67c107.6,0,204.85-61.78,253.81-161.25a21.33,21.33,0,0,0,0-18.83A291,291,0,0,0,409.84,132.33ZM256,362.67a105.78,105.78,0,0,1-58.7-17.8l31.21-31.21A63.29,63.29,0,0,0,256,320a64.07,64.07,0,0,0,64-64,63.28,63.28,0,0,0-6.34-27.49l31.21-31.21A106.45,106.45,0,0,1,256,362.67ZM2.19,265.42a21.33,21.33,0,0,1,0-18.83C51.15,147.11,148.4,85.33,256,85.33a277,277,0,0,1,70.4,9.22l-55.88,55.88A105.9,105.9,0,0,0,150.44,270.52L67.88,353.08A295.2,295.2,0,0,1,2.19,265.42Z"/>
        </svg>`;

        function toggleVisibility(inputId, buttonId) {
            const input = document.getElementById(inputId);
            const button = document.getElementById(buttonId);
            if (input.type === "password") {
                input.type = "text";
                button.innerHTML = eyeClosed;
            } else {
                input.type = "password";
                button.innerHTML = eyeOpen;
            }
        }

        document.getElementById("toggleCurrent").addEventListener("click", function() {
            toggleVisibility("current_password", "toggleCurrent");
        });

        document.getElementById("toggleNew").addEventListener("click", function() {
            toggleVisibility("new_password", "toggleNew");
        });

        document.getElementById("toggleConfirmation").addEventListener("click", function() {
            toggleVisibility("confirmation", "toggleConfirmation");
        });

        document.querySelector("form").addEventListener("submit", function(event) {
            const newPassword = document.getElementById("new_password").value;
            const confirmation = document.getElementById("confirmation").value;
            const matchError = document.getElementById("password-match-error");
            const lengthError = document.getElementById("password-length-error");
            let valid = true;

            if (newPassword.length < 8) {
                event.preventDefault();
                lengthError.style.display = "block";
                document.getElementById("new_password").classList.add("is-invalid");
                valid = false;
            } else {
                lengthError.style.display = "none";
                document.getElementById("new_password").classList.remove("is-invalid");
            }

            if (newPassword !== confirmation) {
                event.preventDefault();
                matchError.style.display = "block";
                document.getElementById("confirmation").classList.add("is-invalid");
                valid = false;
            } else {
                matchError.style.display = "none";
                document.getElementById("confirmation").classList.remove("is-invalid");
            }
        });
    </script>
{% endblock %}
